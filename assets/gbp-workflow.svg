<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#090b12"/>
      <stop offset="100%" stop-color="#0d101e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f6bf0" fill-opacity="0.6"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8a820" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="900" fill="url(#bg)"/>
  <circle cx="450" cy="450" r="380" fill="#4f6bf0" fill-opacity="0.04"/>
  <circle cx="450" cy="450" r="240" fill="#4f6bf0" fill-opacity="0.03"/>

  <!-- Title -->
  <text x="450" y="68" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#eef0ff" text-anchor="middle">KI-Workflow Automatisierung</text>
  <text x="450" y="98" font-family="Arial, sans-serif" font-size="16" fill="#555d80" text-anchor="middle">So arbeitet BTS Intelligence für Ihren Betrieb</text>

  <!-- ── Node 1: Auftrag eingeht ── -->
  <rect x="60" y="160" width="200" height="90" rx="14" fill="#111525" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="60" y="160" width="200" height="4" rx="2" fill="#4f6bf0"/>
  <text x="160" y="198" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">📋 Auftrag geht ein</text>
  <text x="160" y="216" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">E-Mail · Formular · CRM</text>
  <text x="160" y="233" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">Trigger-Node (n8n)</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="205" x2="318" y2="205" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Node 2: KI-Agent analysiert ── -->
  <rect x="320" y="160" width="200" height="90" rx="14" fill="#111525" stroke="#e8a820" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="320" y="160" width="200" height="4" rx="2" fill="#e8a820"/>
  <text x="420" y="198" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">🤖 KI-Agent analysiert</text>
  <text x="420" y="216" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Klassifizierung &amp; Prüfung</text>
  <text x="420" y="233" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">Eigener KI-Agent (BTS)</text>

  <!-- Arrow 2→3 -->
  <line x1="520" y1="205" x2="578" y2="205" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Node 3: Angebot erstellt ── -->
  <rect x="580" y="160" width="200" height="90" rx="14" fill="#111525" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="580" y="160" width="200" height="4" rx="2" fill="#4f6bf0"/>
  <text x="680" y="198" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">📄 Angebot erstellt</text>
  <text x="680" y="216" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Mit Briefkopf &amp; Preisen</text>
  <text x="680" y="233" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">Template-Node (n8n)</text>

  <!-- Arrow down from node 3 -->
  <line x1="680" y1="250" x2="680" y2="308" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Node 4: Auftrag bestätigt ── -->
  <rect x="580" y="310" width="200" height="90" rx="14" fill="#111525" stroke="#e8a820" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="580" y="310" width="200" height="4" rx="2" fill="#e8a820"/>
  <text x="680" y="348" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">✅ Auftrag bestätigt</text>
  <text x="680" y="366" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Automatische Bestätigung</text>
  <text x="680" y="383" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">E-Mail-Node (n8n)</text>

  <!-- Arrow left from node 4 -->
  <line x1="580" y1="355" x2="522" y2="355" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Node 5: Rechnung wird erstellt ── -->
  <rect x="320" y="310" width="200" height="90" rx="14" fill="#111525" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="320" y="310" width="200" height="4" rx="2" fill="#4f6bf0"/>
  <text x="420" y="348" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">🧾 Rechnung erstellt</text>
  <text x="420" y="366" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Automatisch nach Abschluss</text>
  <text x="420" y="383" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">Rechnungs-Node (n8n)</text>

  <!-- Arrow left from node 5 -->
  <line x1="320" y1="355" x2="262" y2="355" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Node 6: Fälligkeit prüfen ── -->
  <rect x="60" y="310" width="200" height="90" rx="14" fill="#111525" stroke="#e8a820" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="60" y="310" width="200" height="4" rx="2" fill="#e8a820"/>
  <text x="160" y="348" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">⏰ Fälligkeit prüfen</text>
  <text x="160" y="366" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Täglicher Cron-Job</text>
  <text x="160" y="383" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">Schedule-Node (n8n)</text>

  <!-- Arrow down from node 6 -->
  <line x1="160" y1="400" x2="160" y2="458" stroke="#e8a820" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- ── Node 7: Mahnung verschicken ── -->
  <rect x="60" y="460" width="200" height="90" rx="14" fill="#111525" stroke="#e8a820" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="60" y="460" width="200" height="4" rx="2" fill="#e8a820"/>
  <text x="160" y="498" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">📨 Mahnung verschickt</text>
  <text x="160" y="516" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Stufe 1 / 2 / 3 automatisch</text>
  <text x="160" y="533" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">E-Mail-Node (n8n)</text>

  <!-- Arrow right from node 7 -->
  <line x1="260" y1="505" x2="318" y2="505" stroke="#e8a820" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- ── Node 8: CRM aktualisiert ── -->
  <rect x="320" y="460" width="200" height="90" rx="14" fill="#111525" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="320" y="460" width="200" height="4" rx="2" fill="#4f6bf0"/>
  <text x="420" y="498" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">🗂 CRM aktualisiert</text>
  <text x="420" y="516" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Status &amp; Verlauf gepflegt</text>
  <text x="420" y="533" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">CRM-Node (n8n)</text>

  <!-- Arrow right from node 8 -->
  <line x1="520" y1="505" x2="578" y2="505" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Node 9: Zahlung eingegangen ── -->
  <rect x="580" y="460" width="200" height="90" rx="14" fill="#111525" stroke="#4f6bf0" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="580" y="460" width="200" height="4" rx="2" fill="#4f6bf0"/>
  <text x="680" y="498" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#eef0ff" text-anchor="middle">💶 Zahlung gebucht</text>
  <text x="680" y="516" font-family="Arial, sans-serif" font-size="11" fill="#9aa3cc" text-anchor="middle">Automatische Bestätigung</text>
  <text x="680" y="533" font-family="Arial, sans-serif" font-size="10" fill="#555d80" text-anchor="middle">Webhook-Node (n8n)</text>

  <!-- Result box -->
  <rect x="120" y="630" width="660" height="90" rx="16" fill="#0d1a12" stroke="#22543d" stroke-width="1.5"/>
  <text x="450" y="668" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#68d391" text-anchor="middle">Ergebnis: Bis zu 80 % weniger Zahlungsverzug</text>
  <text x="450" y="695" font-family="Arial, sans-serif" font-size="14" fill="#9aa3cc" text-anchor="middle">Kein manuelles Nachfassen · Kein vergessener Auftrag · Cashflow planbar</text>

  <!-- Powered by badge -->
  <text x="450" y="800" font-family="Arial, sans-serif" font-size="13" fill="#555d80" text-anchor="middle">Entwickelt mit n8n &amp; eigenen KI-Agenten von BTS Intelligence · btsintelligence.de</text>
</svg>
