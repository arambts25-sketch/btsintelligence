  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgG)"/>

  <!-- Glow -->
  <circle cx="300" cy="240" r="220" fill="#4f6bf0" fill-opacity="0.07"/>
  <circle cx="300" cy="240" r="140" fill="#4f6bf0" fill-opacity="0.05"/>

  <!-- Icon box -->
  <rect x="220" y="110" width="160" height="160" rx="36" fill="url(#iconG)"/>

  <!-- B shape -->
  <path d="M248 138h42a24 24 0 0 1 0 48h-42v-48z" fill="white" fill-opacity=".95"/>
  <path d="M248 186h45a27 27 0 0 1 0 54h-45v-54z" fill="white" fill-opacity=".65"/>

