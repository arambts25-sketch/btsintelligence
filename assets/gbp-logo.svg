      <stop offset="0%" stop-color="#090b12"/>
      <stop offset="100%" stop-color="#0d101e"/>
    </linearGradient>
    <linearGradient id="iconG" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b82f5"/>
