  <circle cx="336" cy="152" r="11" fill="#e8a820"/>
  <line x1="336" y1="163" x2="336" y2="226" stroke="#e8a820" stroke-width="9" stroke-linecap="round"/>

  <!-- Company name -->
  <text x="300" y="332" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#eef0ff" text-anchor="middle" letter-spacing="2">BTS</text>
  <text x="300" y="372" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#7b93f5" text-anchor="middle" letter-spacing="10">INTELLIGENCE</text>

